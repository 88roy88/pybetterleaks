name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  wheels:
    uses: ./.github/workflows/wheels.yml

  publish:
    needs: wheels
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
