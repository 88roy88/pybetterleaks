name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  wheels:
    uses: ./.github/workflows/wheels.yml

  publish:
    needs: wheels
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Generate checksums
        run: python scripts/checksums.py dist --output ../release/SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: release/SHA256SUMS

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Verify PyPI install
        run: python scripts/pypi_smoke.py --version "${GITHUB_REF_NAME#v}" --retries 12 --retry-delay 10
