name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Detect merged release branch
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          prs="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq '.[] | select(.merged_at != null and (.head.ref | startswith("release/v"))) | .head.ref'
          )"
          head_ref="$(printf '%s\n' "$prs" | head -n 1)"

          if [ -z "$head_ref" ]; then
            echo "No merged release/v* PR found for ${GITHUB_SHA}; skipping tag."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="${head_ref#release/v}"
          tag="v${version}"

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([A-Za-z0-9.+-]+)?$ ]]; then
            echo "Invalid release branch version: $head_ref" >&2
            exit 1
          fi

          project_version="$(
            python -c 'import pathlib, tomllib; data = tomllib.loads(pathlib.Path("pyproject.toml").read_text()); print(data["project"]["version"])'
          )"

          if [ "$project_version" != "$version" ]; then
            echo "Release branch version $version does not match pyproject.toml $project_version" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists; skipping."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.release.outputs.release == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/${TAG}"
