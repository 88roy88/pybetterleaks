site_name: PyBetterleaks
site_description: Python-native Betterleaks bindings with bundled platform wheels.
site_author: Roy Mezan
site_url: https://roymezan.github.io/pybetterleaks/
repo_name: roymezan/pybetterleaks
repo_url: https://github.com/roymezan/pybetterleaks
edit_uri: blob/main/docs/

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Benchmarks: benchmarks.md
  - API Reference: api.md
  - Architecture: architecture.md
  - ABI Contract: abi.md
  - Betterleaks Pin: betterleaks-pin.md
  - Packaging Notes: implementation-notes.md
  - Release Checklist: release-checklist.md
  - Troubleshooting: troubleshooting.md
  - v1.0 Readiness: v1-readiness.md
  - Roadmap: roadmap.md
  - Backlog: backlog.md
  - v0.2 Plan: v0.2-plan.md
  - v0.3 Plan: v0.3-plan.md
  - v0.4 Plan: v0.4-plan.md
  - Maintainer Handoff: ai-handoff.md
  - Planning:
      - Project Brief: project-brief.md
      - Workplan: workplan.md
      - Docs Map: docs-map.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - python
          options:
            docstring_style: google
            heading_level: 2
            inherited_members: true
            merge_init_into_class: true
            separate_signature: true
            show_root_heading: true
            show_source: false
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
